<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked: For Good - Cinematic Scene</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="title-container">
        <h1>Wicked</h1>
        <h2>For Good</h2>
    </div>
    <div class="scene-container">
        <!-- Background Elements -->
        <div class="emerald-city-skyline">
            <div class="spire spire-1"></div>
            <div class="spire spire-2"></div>
            <div class="spire spire-3"></div>
            <div class="spire spire-4"></div>
            <div class="spire spire-5"></div>
        </div>

        <!-- Storm and Aurora Effects -->
        <div class="storm-clouds"></div>
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
        <div class="lightning-flash"></div>

        <!-- Platform and Ground -->
        <div class="crumbling-platform">
            <div class="platform-cracks"></div>
        </div>

        <!-- Elphaba -->
        <div class="character elphaba">
            <img src="elphaba.png" alt="Elphaba" class="character-image">
            <div class="green-magic-aura"></div>
            <div class="magic-text">
                <span class="glowing-text">OUR WIZARD LIES</span>
            </div>
        </div>

        <!-- Glinda -->
        <div id="glinda" class="character glinda">
            <img src="glinda.png" alt="Glinda" class="character-image">
            <div class="pink-shimmer"></div>
            <div class="bubble bubble-1"></div>
            <div class="bubble bubble-2"></div>
            <div class="bubble bubble-3"></div>
            <div class="bubble bubble-4"></div>
        </div>

        <!-- Fiyero -->
        <div class="character fiyero">
            <img src="fiyero.png" alt="Fiyero" class="character-image">
        </div>

        <!-- Dorothy and Friends -->
        <div class="dorothy-group">
            <div id="dorothy" class="character dorothy">
                <img src="dorothy.png" alt="Dorothy" class="character-image">
                <div class="lantern-glow"></div>
            </div>
            <div class="character scarecrow">
                <img src="scarecrow.png" alt="Scarecrow" class="character-image">
            </div>
            <div class="character tin-man">
                <img src="tin_man.png" alt="Tin Man" class="character-image">
            </div>
            <div class="character lion">
                <img src="lion.png" alt="Lion" class="character-image">
            </div>
        </div>

        <!-- Villains in Shadows -->
        <div class="villains-group">
            <div class="character morrible">
                <img src="morrible.png" alt="Madame Morrible" class="character-image">
            </div>
            <div id="wizard" class="character wizard">
                <img src="wizard.png" alt="The Wizard" class="character-image">
            </div>
        </div>

        <!-- Nessarose's Presence -->
        <div class="nessarose-hint">
            <img src="ruby_shoes.png" alt="Enchanted Shoes" class="shoes">
            <div class="shoe-glow"></div>
        </div>

        <!-- Interactive Elements -->
        <div class="magical-particles"></div>
        <div class="emerald-lights">
            <div class="emerald-light light-1"></div>
            <div class="emerald-light light-2"></div>
            <div class="emerald-light light-3"></div>
            <div class="emerald-light light-4"></div>
        </div>
    </div>

    <div id="audio-consent-overlay">
        <button id="play-audio-button">Click to Enable Sound</button>
    </div>

    <script src="script.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
